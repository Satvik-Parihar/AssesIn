name: Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish API
        run: |
          dotnet publish backend/OnlineExamAPI/OnlineExamAPI.csproj -c Release -o artifacts/api /p:UseAppHost=false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/online-exam/package-lock.json

      - name: Build frontend
        working-directory: frontend/online-exam
        run: |
          npm ci
          npm run build

      - name: Pack deployment archives
        run: |
          mkdir -p artifacts
          tar -czf artifacts/assessin-api.tgz -C artifacts/api .
          tar -czf artifacts/assessin-web.tgz -C frontend/online-exam/dist/online-exam/browser .
          tar \
            --exclude-vcs \
            --exclude='**/node_modules' \
            --exclude='**/bin' \
            --exclude='**/obj' \
            --exclude='artifacts' \
            --exclude='deploy' \
            --exclude='assessin.pem' \
            -czf artifacts/assessin-source.tgz .

      - name: Setup SSH key
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/assessin.pem
          chmod 600 ~/.ssh/assessin.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          scp -i ~/.ssh/assessin.pem artifacts/assessin-api.tgz "$EC2_USER@$EC2_HOST:/tmp/assessin-api.tgz"
          scp -i ~/.ssh/assessin.pem artifacts/assessin-web.tgz "$EC2_USER@$EC2_HOST:/tmp/assessin-web.tgz"
          scp -i ~/.ssh/assessin.pem artifacts/assessin-source.tgz "$EC2_USER@$EC2_HOST:/tmp/assessin-source.tgz"
          scp -i ~/.ssh/assessin.pem scripts/deploy_remote.sh "$EC2_USER@$EC2_HOST:/tmp/deploy_remote.sh"

      - name: Run remote deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/assessin.pem "$EC2_USER@$EC2_HOST" "chmod +x /tmp/deploy_remote.sh && /tmp/deploy_remote.sh"

      - name: Verify deployment
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          TARGET_URL="${DEPLOY_URL:-https://assessin.me}"

          # If DEPLOY_URL is set to a raw IP, domain-only Nginx rules may return empty replies.
          if [[ "$TARGET_URL" =~ ^https?://([0-9]{1,3}\.){3}[0-9]{1,3}(/.*)?$ ]]; then
            TARGET_URL="https://assessin.me"
          fi

          echo "Checking public endpoint: $TARGET_URL"
          if curl -fsSIL --retry 5 --retry-delay 5 --retry-connrefused "$TARGET_URL"; then
            echo "Public verification passed"
            exit 0
          fi

          echo "Public verification failed, falling back to server-side checks"
          ssh -i ~/.ssh/assessin.pem "$EC2_USER@$EC2_HOST" "set -e; \
            sudo systemctl is-active --quiet assessin-api; \
            sudo systemctl is-active --quiet nginx; \
            curl -fsSIL -H 'Host: assessin.me' http://127.0.0.1/ > /dev/null; \
            code=\$(curl -s -o /dev/null -w '%{http_code}' -H 'Host: assessin.me' http://127.0.0.1/api/exams); \
            if [ \"\$code\" != \"401\" ] && [ \"\$code\" != \"200\" ] && [ \"\$code\" != \"403\" ]; then \
              echo \"Unexpected API status: \$code\"; exit 1; \
            fi"

          echo "Server-side verification passed"
