name: Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish API
        run: |
          dotnet publish backend/OnlineExamAPI/OnlineExamAPI.csproj -c Release -o artifacts/api /p:UseAppHost=false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/online-exam/package-lock.json

      - name: Build frontend
        working-directory: frontend/online-exam
        run: |
          npm ci
          npm run build

      - name: Pack deployment archives
        run: |
          mkdir -p artifacts
          tar -czf artifacts/assessin-api.tgz -C artifacts/api .
          tar -czf artifacts/assessin-web.tgz -C frontend/online-exam/dist/online-exam/browser .
          tar \
            --exclude-vcs \
            --exclude='**/node_modules' \
            --exclude='**/bin' \
            --exclude='**/obj' \
            --exclude='deploy' \
            --exclude='assessin.pem' \
            -czf artifacts/assessin-source.tgz .

      - name: Setup SSH key
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/assessin.pem
          chmod 600 ~/.ssh/assessin.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          scp -i ~/.ssh/assessin.pem artifacts/assessin-api.tgz "$EC2_USER@$EC2_HOST:/tmp/assessin-api.tgz"
          scp -i ~/.ssh/assessin.pem artifacts/assessin-web.tgz "$EC2_USER@$EC2_HOST:/tmp/assessin-web.tgz"
          scp -i ~/.ssh/assessin.pem artifacts/assessin-source.tgz "$EC2_USER@$EC2_HOST:/tmp/assessin-source.tgz"
          scp -i ~/.ssh/assessin.pem scripts/deploy_remote.sh "$EC2_USER@$EC2_HOST:/tmp/deploy_remote.sh"

      - name: Run remote deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/assessin.pem "$EC2_USER@$EC2_HOST" "chmod +x /tmp/deploy_remote.sh && /tmp/deploy_remote.sh"

      - name: Verify deployment
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          TARGET_URL="${DEPLOY_URL:-http://13.234.187.66}"
          echo "Checking $TARGET_URL"
          curl -I --retry 5 --retry-delay 5 "$TARGET_URL"
