<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card-header">
      <div class="auth-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="36" height="36" rx="10" fill="#2563eb"/>
          <path d="M10 12h16M10 18h12M10 24h8" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <circle cx="26" cy="24" r="4" fill="white"/>
          <path d="M24.5 24l1 1 2.5-2.5" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Login to access your exam dashboard</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form" novalidate>
      <div *ngIf="errorMessage" class="alert-error">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm.75 3.75a.75.75 0 00-1.5 0v3.5a.75.75 0 001.5 0v-3.5zm-.75 6.5a.875.875 0 110-1.75.875.875 0 010 1.75z"/></svg>
        {{ errorMessage }}
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input
          type="email"
          id="email"
          class="form-input"
          [(ngModel)]="email"
          (ngModelChange)="onFieldChange()"
          (focus)="setActiveField('email')"
          (blur)="clearActiveField('email')"
          name="email"
          placeholder="Enter your email"
          autocomplete="email"
          required />
        <p *ngIf="activeField === 'email' && emailError" class="field-error">{{ emailError }}</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          id="password"
          class="form-input"
          [(ngModel)]="password"
          (ngModelChange)="onFieldChange()"
          (focus)="setActiveField('password')"
          (blur)="clearActiveField('password')"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required />
        <p *ngIf="activeField === 'password' && passwordError" class="field-error">{{ passwordError }}</p>
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading || !isFormValid">
        <span *ngIf="isLoading" class="spinner"></span>
        {{ isLoading ? 'Signing in...' : 'Login' }}
      </button>

      <p class="auth-link-text">
        Don't have an account? <a routerLink="/register" class="auth-link">Register here</a>
      </p>
    </form>

  </div>
</div>
