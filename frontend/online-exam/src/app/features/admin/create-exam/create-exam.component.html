<div class="page-wrapper">
  <div class="oes-container">
    <div class="page-header">
      <div>
        <h1 class="page-title">Create New Exam</h1>
        <p class="page-subtitle">Enter basic information for the exam</p>
      </div>
    </div>

    <div class="form-card" style="max-width: 680px;">
      <div *ngIf="successMessage" class="alert-success">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm3.78 5.28l-4.5 4.5a.75.75 0 01-1.06 0l-2-2a.75.75 0 011.06-1.06L6.75 9.19l3.97-3.97a.75.75 0 011.06 1.06z"/></svg>
        {{ successMessage }}
        <button *ngIf="createdExamId" class="btn-link ml-8" (click)="goToAddQuestions()">→ Add Questions Now</button>
      </div>

      <div *ngIf="errorMessage" class="alert-error">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm.75 3.75a.75.75 0 00-1.5 0v3.5a.75.75 0 001.5 0v-3.5zm-.75 6.5a.875.875 0 110-1.75.875.875 0 010 1.75z"/></svg>
        {{ errorMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" novalidate>
        <div class="form-group">
          <label class="form-label" for="title">Exam Title</label>
          <input type="text" id="title" class="form-input" [(ngModel)]="title" name="title"
            (ngModelChange)="onFieldChange()"
            (focus)="setActiveField('title')"
            (blur)="clearActiveField('title')"
            placeholder="e.g. Mathematics Final Exam" required />
          <p *ngIf="activeField === 'title' && titleError" class="field-error">{{ titleError }}</p>
        </div>

        <div class="form-group">
          <label class="form-label" for="subject">Subject</label>
          <input type="text" id="subject" class="form-input" [(ngModel)]="subject" name="subject"
            (ngModelChange)="onFieldChange()"
            (focus)="setActiveField('subject')"
            (blur)="clearActiveField('subject')"
            placeholder="e.g. Mathematics" required />
          <p *ngIf="activeField === 'subject' && subjectError" class="field-error">{{ subjectError }}</p>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label" for="duration">Duration (minutes)</label>
            <input type="number" id="duration" class="form-input" [(ngModel)]="durationMinutes" name="duration"
              (ngModelChange)="onFieldChange()"
              (focus)="setActiveField('durationMinutes')"
              (blur)="clearActiveField('durationMinutes')"
              placeholder="e.g. 60" min="1" required />
            <p *ngIf="activeField === 'durationMinutes' && durationError" class="field-error">{{ durationError }}</p>
            <p class="helper-text">How long students have to complete the exam.</p>
          </div>

          <div class="form-group">
            <label class="form-label" for="marks">Total Marks</label>
            <input type="number" id="marks" class="form-input" [(ngModel)]="totalMarks" name="marks"
              (ngModelChange)="onFieldChange()"
              (focus)="setActiveField('totalMarks')"
              (blur)="clearActiveField('totalMarks')"
              placeholder="e.g. 100" min="1" required />
            <p *ngIf="activeField === 'totalMarks' && totalMarksError" class="field-error">{{ totalMarksError }}</p>
            <p class="helper-text">Maximum score achievable in this exam.</p>
          </div>
        </div>

        <button type="submit" class="btn-submit" [disabled]="isLoading || !isFormValid">
          <span *ngIf="isLoading" class="spinner"></span>
          {{ isLoading ? 'Creating...' : 'Create Exam' }}
        </button>
      </form>
    </div>
  </div>
</div>
